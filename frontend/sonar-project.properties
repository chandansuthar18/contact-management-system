# ============================================================
# SonarQube Configuration — React Frontend
# Run: npx sonar-scanner  (from /frontend directory)
# ============================================================

sonar.projectKey=cms-frontend
sonar.projectName=Contact Management System - Frontend
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.jsx,**/*.test.js

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=test-results.xml

sonar.host.url=http://localhost:9000
sonar.login=YOUR_SONAR_TOKEN_HERE
